<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <linearGradient id="bg-ds" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5000"/>
      <stop offset="50%" stop-color="#C06A00"/>
      <stop offset="100%" stop-color="#E8820C"/>
    </linearGradient>
    <linearGradient id="fg-ds" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE8CC"/>
    </linearGradient>
    <radialGradient id="shine-ds" cx="0.3" cy="0.2" r="0.65">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="108" height="108" fill="url(#bg-ds)" rx="24"/>
  <rect width="108" height="108" fill="url(#shine-ds)" rx="24"/>

  <!-- Large microphone — fills more of the icon -->
  <g transform="translate(54, 50)">
    <!-- Mic capsule (larger) -->
    <rect x="-10" y="-26" width="20" height="30" rx="10" fill="url(#fg-ds)"/>
    <!-- Holder arc around capsule -->
    <path d="M-16,4 A16,16 0 0,0 16,4" fill="none" stroke="url(#fg-ds)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Stand -->
    <line x1="0" y1="4" x2="0" y2="18" stroke="url(#fg-ds)" stroke-width="4" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-10" y1="18" x2="10" y2="18" stroke="url(#fg-ds)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Sound arcs (right side) -->
    <path d="M16,-12 Q22,-6 16,0" fill="none" stroke="url(#fg-ds)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <path d="M22,-16 Q30,-6 22,4" fill="none" stroke="url(#fg-ds)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
