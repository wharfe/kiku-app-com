<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <linearGradient id="bg-bs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5000"/>
      <stop offset="50%" stop-color="#C06A00"/>
      <stop offset="100%" stop-color="#E8820C"/>
    </linearGradient>
    <linearGradient id="fg-bs" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE8CC"/>
    </linearGradient>
    <radialGradient id="shine-bs" cx="0.3" cy="0.2" r="0.65">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: same deep amber as player -->
  <rect width="108" height="108" fill="url(#bg-bs)" rx="24"/>
  <rect width="108" height="108" fill="url(#shine-bs)" rx="24"/>

  <!-- K letterform with waveform/record integrated -->
  <g transform="translate(54, 54)" fill="url(#fg-bs)">
    <!-- K vertical stroke -->
    <rect x="-18" y="-20" width="7" height="40" rx="3.5"/>
    <!-- K upper diagonal -->
    <polygon points="-11,-4 8,-20 14,-14 -5,4"/>
    <!-- K lower diagonal + waveform bars -->
    <polygon points="-11,4 2,10 -11,20"/>
    <!-- Waveform bars (recording/studio motif) -->
    <rect x="4" y="2" width="4" height="16" rx="2"/>
    <rect x="11" y="-4" width="4" height="22" rx="2"/>
    <rect x="18" y="0" width="4" height="14" rx="2"/>
  </g>
</svg>
