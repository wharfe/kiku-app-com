<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <linearGradient id="bg-es" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5000"/>
      <stop offset="50%" stop-color="#C06A00"/>
      <stop offset="100%" stop-color="#E8820C"/>
    </linearGradient>
    <linearGradient id="fg-es" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE0B8"/>
    </linearGradient>
    <radialGradient id="shine-es" cx="0.3" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="108" height="108" fill="url(#bg-es)" rx="24"/>
  <rect width="108" height="108" fill="url(#shine-es)" rx="24"/>

  <!-- Giant K (slightly smaller to make room for S) -->
  <g transform="translate(46, 48)" fill="url(#fg-es)">
    <!-- Vertical stroke -->
    <rect x="-22" y="-26" width="9" height="52" rx="3"/>
    <!-- Upper arm -->
    <path d="M-13,-5 L14,-26 L22,-19 L-5,5 Z"/>
    <!-- Lower arm -->
    <path d="M-5,1 L22,26 L14,33 L-13,10 Z"/>
  </g>

  <!-- Small "S" badge in bottom-right -->
  <g transform="translate(78, 76)">
    <circle r="12" fill="rgba(0,0,0,0.3)"/>
    <circle r="11" fill="url(#fg-es)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#8B5000">S</text>
  </g>
</svg>
