<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <linearGradient id="bg-cs" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFDCBE"/>
      <stop offset="40%" stop-color="#FFB870"/>
      <stop offset="100%" stop-color="#E8820C"/>
    </linearGradient>
    <radialGradient id="shine-cs" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="circle-cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF5EB"/>
    </linearGradient>
  </defs>

  <!-- Background: same warm gradient as player -->
  <rect width="108" height="108" fill="url(#bg-cs)" rx="24"/>
  <rect width="108" height="108" fill="url(#shine-cs)" rx="24"/>

  <!-- Central circle -->
  <circle cx="54" cy="52" r="26" fill="url(#circle-cs)" opacity="0.95"/>

  <!-- Microphone inside circle -->
  <g transform="translate(54, 48)">
    <!-- Mic capsule -->
    <rect x="-5.5" y="-14" width="11" height="17" rx="5.5" fill="#8B5000"/>
    <!-- Mic stand -->
    <line x1="0" y1="3" x2="0" y2="12" stroke="#8B5000" stroke-width="3" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-7" y1="12" x2="7" y2="12" stroke="#8B5000" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Sound arcs -->
    <path d="M10,-6 Q14,-2 10,3" fill="none" stroke="#8B5000" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-10,-6 Q-14,-2 -10,3" fill="none" stroke="#8B5000" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Small waveform dots -->
  <circle cx="54" cy="72" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="60" cy="74" r="1" fill="white" opacity="0.5"/>
  <circle cx="48" cy="74" r="1" fill="white" opacity="0.5"/>
</svg>
