<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <linearGradient id="bg-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD0A0"/>
      <stop offset="100%" stop-color="#E8820C"/>
    </linearGradient>
    <linearGradient id="fg-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF0E0"/>
    </linearGradient>
    <!-- Subtle shine -->
    <radialGradient id="shine-a" cx="0.35" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#bg-a)" rx="24"/>
  <!-- Shine overlay -->
  <rect width="108" height="108" fill="url(#shine-a)" rx="24"/>

  <!-- Headphone shape -->
  <g transform="translate(54, 54)">
    <!-- Headband arc -->
    <path d="M-22,-8 A26,26 0 0,1 22,-8" fill="none" stroke="url(#fg-a)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left ear cup -->
    <rect x="-27" y="-10" width="10" height="22" rx="5" fill="url(#fg-a)"/>
    <!-- Right ear cup -->
    <rect x="17" y="-10" width="10" height="22" rx="5" fill="url(#fg-a)"/>
    <!-- Sound waves (listening) -->
    <path d="M-6,0 Q-3,-8 0,0 Q3,8 6,0 Q9,-8 12,0" fill="none" stroke="url(#fg-a)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
